description = "Sift 本地持久化(SQLite)"
authors = ["xiaozhong"]
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "sift_storage"

[dependencies]
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
